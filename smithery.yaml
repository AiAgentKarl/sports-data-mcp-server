  - soccer
  - basketball
  - nba
  - nfl
  - scores
  - statistics
  - ai-agent
startCommand:
  type: stdio
  configSchema:
    type: object
    properties: {}
  commandFunction: |-
    (config) => ({
      command: "uvx",
      args: ["sports-data-mcp-server"]
    })
